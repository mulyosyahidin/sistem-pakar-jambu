services:
  nginx:
    image: nginx:alpine
    container_name: sistem-pakar-jambu-nginx
    restart: unless-stopped
    volumes:
      - ./docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - traefik-public
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sistem-pakar-jambu.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.sistem-pakar-jambu.entrypoints=websecure"
      - "traefik.http.routers.sistem-pakar-jambu.tls.certresolver=cloudflare"
      - "traefik.http.services.sistem-pakar-jambu.loadbalancer.server.port=80"

  app:
    image: ${DOCKER_IMAGE}
    container_name: sistem-pakar-jambu-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  db:
    image: mariadb:11
    container_name: sistem-pakar-jambu-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/production/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USERNAME} -p${DB_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2GB

volumes:
  app-public:
  app-storage:
  db-data:

networks:
  internal:
    name: sistem-pakar-jambu-internal
  traefik-public:
    external: true